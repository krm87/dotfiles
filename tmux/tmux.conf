set-option -g default-shell "$SHELL"
set-option -g default-command "$SHELL"

unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind-key r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

set-option -g mouse on
set-option -g history-limit 50000
set-option -g escape-time 10
set-option -g focus-events on
set-option -g detach-on-destroy off
set-option -g renumber-windows on
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi

set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set-option -as terminal-features ",xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB,xterm-ghostty:RGB,ghostty:RGB"
set-option -g set-clipboard on

bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
unbind-key '"'
unbind-key %
bind-key c new-window -c "#{pane_current_path}"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

bind-key s choose-tree -Zs
bind-key w choose-tree -Zw

bind-key [ copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tmux-copy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "tmux-copy"

set-option -g status-interval 5
set-option -g status-left-length 40
set-option -g status-right "%Y-%m-%d %H:%M"

# Keep session restore plugin-free for now. Add TPM/tmux-resurrect only if
# explicit pane/window restoration becomes worth the extra moving parts.
